name: Run the test suite

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "pypy-3.8", "pypy-3.9"]
        include:
        - os: ubuntu-latest
          python-version: "3.7"
          container: "python:3.7"
        - os: macos-latest
          python-version: "3.7"
          pyenv-version: "3.7.17"
        - os: windows-latest
          python-version: "3.7"
        - os: macos-latest
          python-version: "3.11"
        - os: windows-latest
          python-version: "3.11"
        - os: macos-latest
          python-version: "pypy-3.9"
        - os: windows-latest
          python-version: "pypy-3.9"
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      if: matrix.container == '' && matrix.pyenv-version == ''
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install Python ${{ matrix.pyenv-version }} via pyenv (macOS)
      if: matrix.pyenv-version != ''
      run: |
        # Python 3.7 has no prebuilt binaries for macOS arm64 (it predates
        # Apple Silicon), so build it from source via pyenv. pyenv is
        # preinstalled on the GitHub-hosted macOS runner image.
        brew install openssl@1.1 readline sqlite3 xz zlib
        export LDFLAGS="-L$(brew --prefix openssl@1.1)/lib -L$(brew --prefix readline)/lib -L$(brew --prefix zlib)/lib"
        export CPPFLAGS="-I$(brew --prefix openssl@1.1)/include -I$(brew --prefix readline)/include -I$(brew --prefix zlib)/include"
        export PKG_CONFIG_PATH="$(brew --prefix openssl@1.1)/lib/pkgconfig:$(brew --prefix readline)/lib/pkgconfig:$(brew --prefix zlib)/lib/pkgconfig"
        pyenv install --skip-existing "${{ matrix.pyenv-version }}"
        PYENV_PREFIX="$(pyenv root)/versions/${{ matrix.pyenv-version }}"
        echo "$PYENV_PREFIX/bin" >> "$GITHUB_PATH"
        "$PYENV_PREFIX/bin/python" -m pip install --upgrade pip
    - name: Install the project
      run: pip install --no-binary=wheel .
    - name: Install test dependencies
      run: pip install .[test] coverage[toml]
    - name: Include SDist check dependencies
      if: matrix.python-version == '3.11'
      run: pip install build flit
    - name: Test with pytest
      run: pytest
      env:
        PYTHONWARNDEFAULTENCODING: 1
